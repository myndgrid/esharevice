name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    # Postgres service container so the integration test (reserve-race) actually
    # runs instead of skipping. Mirrors the local dev setup — same user/pass/db,
    # same Drizzle migrations applied via a setup step below.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: esharevice
          POSTGRES_USER: esharevice
          POSTGRES_PASSWORD: esharevice
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U esharevice -d esharevice"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    env:
      # Placeholder values for the Zod env validator at module-load time.
      # The unit tests mock out R2 + Redis so no real connections happen;
      # the integration test uses DATABASE_URL (set further below) to hit
      # the Postgres service container.
      OIDC_ISSUER: https://auth.example/
      OIDC_AUDIENCE: e-sharevice-web
      OIDC_JWKS_URL: https://auth.example/jwks/

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # Wait for Postgres + apply schema. Extensions first (citext / pgcrypto),
      # then each Drizzle migration in order. `psql -v ON_ERROR_STOP=1` so a
      # broken SQL file fails the job loudly rather than producing a half-set-up
      # schema and confusing test failures downstream.
      - name: Apply DB migrations
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: esharevice
          PGPASSWORD: esharevice
          PGDATABASE: esharevice
        run: |
          set -euo pipefail
          for try in 1 2 3 4 5; do
            if psql -c 'select 1' >/dev/null 2>&1; then break; fi
            echo "waiting for postgres ($try/5)..."; sleep 2
          done
          psql -v ON_ERROR_STOP=1 -f infra/postgres/init/01-extensions.sql
          for f in packages/db/drizzle/*.sql; do
            echo "applying $f"
            psql -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Test
        env:
          DATABASE_URL: postgresql://esharevice:esharevice@localhost:5432/esharevice
        run: pnpm test

  # Post-deploy regression net: runs after every push to main against the
  # live production URL, asserts per-category Lighthouse scores. NOT a PR
  # gate (PRs haven't deployed yet — there's nothing for LHCI to measure).
  # Slightly conservative thresholds vs the 100/100/100/100 the audit hit,
  # because CI runners are noisy and Lighthouse scores wobble ±3 between
  # runs from CPU contention alone.
  lighthouse:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse CI against production
        # Pinned to a SHA, not a moving tag. A compromised maintainer account
        # could re-tag `v12` to point at a malicious commit that exfiltrates
        # the LH_USER/LH_PASSWORD secrets via the `env:` block below. SHA
        # pinning makes the action's contents immutable. Bump via
        # Dependabot/Renovate (both can rewrite the SHA + trailing comment).
        # Pinned commit: 2026-03-12, "fix interpolation test".
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        env:
          # Consumed by scripts/lighthouse-auth.cjs (the puppeteerScript
          # referenced from lighthouserc.json) so it can authenticate as
          # lh-bot before the auth-gated /messages, /items/new, and
          # /settings/notifications audits. The script is a no-op when
          # either is missing, so PR-time runs against forks (which don't
          # get secrets) still measure the public routes safely.
          LH_USER: ${{ secrets.LH_USER }}
          LH_PASSWORD: ${{ secrets.LH_PASSWORD }}
        with:
          configPath: ./lighthouserc.json
          # `temporary-public-storage` uploads the full HTML report and prints
          # a URL in the job summary, so when scores drop we can dig in
          # immediately instead of re-running locally.
          uploadArtifacts: true
          temporaryPublicStorage: true
