# Authentik Blueprint — declarative provisioning for e-Sharevice.
# Mounted into the Authentik container at /blueprints/custom/esharevice.yaml.
# Authentik applies blueprints on boot and on every restart (idempotent).
#
# This blueprint creates:
#   1. An OAuth2/OIDC provider for the WEB app   (confidential client + PKCE)
#   2. An OAuth2/OIDC provider for the MOBILE app (public client + PKCE)
#   3. An OAuth2/OIDC provider for THIRD-PARTY   (confidential, client_credentials)
#   4. The three Applications linked to those providers
#   5. A group "esharevice-users" that all signups land in by default
#
# OAuth providers (Google, GitHub) are configured via the admin UI after first boot,
# since they require live OAuth client secrets that are easier to manage there.

version: 1
metadata:
  name: e-sharevice
  labels:
    blueprints.goauthentik.io/instantiate: "true"

entries:
  # ─────────────────────────────────────── Default group
  - model: authentik_core.group
    identifiers:
      name: esharevice-users
    attrs:
      attributes:
        scope: standard

  # ─────────────────────────────────────── Signing key — use Authentik's built-in self-signed cert.
  # CertificateKeyPair models require PEM `certificate_data` and can't be created from a blueprint
  # alone, so all three providers below reference the default cert that ships with every Authentik
  # install ("authentik Self-signed Certificate"). To rotate, replace this with a cert managed
  # outside Authentik and re-run.

  # ─────────────────────────────────────── WEB provider
  - model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: e-sharevice-web
    attrs:
      client_type: confidential
      client_id: e-sharevice-web
      # client_secret is auto-generated by Authentik on creation — copy into infra/.env after first boot.
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:  !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      access_code_validity: minutes=10
      access_token_validity: minutes=15
      refresh_token_validity: days=30
      include_claims_in_id_token: true
      sub_mode: hashed_user_id
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
      redirect_uris:
        - matching_mode: strict
          url: https://app.esharevice.com/api/auth/callback
        - matching_mode: strict
          url: http://localhost:3000/api/auth/callback

  - model: authentik_core.application
    identifiers:
      slug: e-sharevice-web
    attrs:
      name: e-Sharevice (Web)
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, e-sharevice-web]]
      meta_launch_url: https://app.esharevice.com
      policy_engine_mode: any
      open_in_new_tab: false

  # ─────────────────────────────────────── MOBILE provider (PKCE, public client)
  - model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: e-sharevice-mobile
    attrs:
      client_type: public
      client_id: e-sharevice-mobile
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:  !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      access_token_validity: minutes=15
      refresh_token_validity: days=30
      include_claims_in_id_token: true
      sub_mode: hashed_user_id
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
      redirect_uris:
        - matching_mode: strict
          url: esharevice://auth/callback

  - model: authentik_core.application
    identifiers:
      slug: e-sharevice-mobile
    attrs:
      name: e-Sharevice (Mobile)
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, e-sharevice-mobile]]

  # ─────────────────────────────────────── THIRD-PARTY (client_credentials)
  - model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: e-sharevice-partners
    attrs:
      client_type: confidential
      client_id: e-sharevice-partners
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:  !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      access_token_validity: hours=1
      include_claims_in_id_token: true
      # client_credentials flow doesn't use redirect_uris, but the serializer requires the field.
      redirect_uris: []
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]

  - model: authentik_core.application
    identifiers:
      slug: e-sharevice-partners
    attrs:
      name: e-Sharevice (Partners API)
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, e-sharevice-partners]]
