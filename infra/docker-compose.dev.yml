# Local dev stack — minimal datastores only.
# Web (Next.js) and API (Express) run on the host via `pnpm dev`, hitting these ports directly.
# Authentik can be added locally later; for week 1–4 dev, the API auth middleware is a no-op stub.

name: esharevice-dev

volumes:
  postgres_data_dev:
  redis_data_dev:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # Host port shifted off the default to coexist with other local Postgres
    # instances (e.g. unrelated docker projects). Container port unchanged.
    # The dev .env in apps/api should connect to localhost:5433.
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: esharevice
      POSTGRES_USER: esharevice
      POSTGRES_PASSWORD: esharevice
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ../infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esharevice -d esharevice"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Host port shifted off the default to coexist with other local Redis
    # instances. Container port unchanged. The dev .env in apps/api should
    # connect to localhost:6380.
    ports:
      - "6380:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
