# Production stack for the Hetzner VPS.
# Deploy via Coolify (Compose resource) or `docker compose -f infra/docker-compose.yml up -d`.
# All secrets are read from `infra/.env` (gitignored). See infra/.env.example.

name: esharevice

networks:
  edge:        # Caddy ↔ web/api
  internal:    # services ↔ datastores (no internet)

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  uptime_kuma_data:

services:
  # ─────────────────────────────────────────── App datastores
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-esharevice}
      POSTGRES_USER: ${POSTGRES_USER:-esharevice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-esharevice} -d $${POSTGRES_DB:-esharevice}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [internal]

  # ─────────────────────────────────────────── App services
  api:
    image: ghcr.io/${GHCR_OWNER:?required}/esharevice-api:${API_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 8080
      API_PUBLIC_URL: https://api.${DOMAIN:?required}
      WEB_ORIGIN: https://${DOMAIN}
      DATABASE_URL: postgresql://${POSTGRES_USER:-esharevice}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-esharevice}
      REDIS_URL: redis://redis:6379
      OIDC_ISSUER: https://${DOMAIN}
      OIDC_AUDIENCE: esharevice-api
      OIDC_JWKS_URL: https://${DOMAIN}/.well-known/jwks.json
      # Cloudflare R2 — optional; all five must be set together for image uploads to work.
      # Until you create the S3-compatible R2 token in the dashboard, leave these
      # blank; POST /v1/exchange-items/:id/image returns 503 until they're filled in.
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-esharevice-images}
      CDN_BASE_URL: ${CDN_BASE_URL:-}
      # Transactional email — optional. Empty defaults make sendReservedEmail
      # a silent no-op; the reserve action still succeeds.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      # Public URL used to build clickable links in emails.
      WEB_PUBLIC_URL: ${WEB_PUBLIC_URL:-https://${DOMAIN}}
      SENTRY_DSN: ${SENTRY_DSN_API:-}
      # Feature flags — default off so a half-migrated env doesn't expose
      # half-baked endpoints. Flip to "true" in infra/.env once the
      # corresponding schema migrations + downstream wiring have landed.
      FEATURE_LISTING_TYPES: ${FEATURE_LISTING_TYPES:-false}
      FEATURE_BOOKINGS: ${FEATURE_BOOKINGS:-false}
      FEATURE_STRIPE: ${FEATURE_STRIPE:-false}
      # Stripe API + webhook secrets — only consumed when FEATURE_STRIPE=true.
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_ACCOUNT_COUNTRY: ${STRIPE_ACCOUNT_COUNTRY:-CA}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [internal, edge]

  web:
    image: ghcr.io/${GHCR_OWNER:?required}/esharevice-web:${WEB_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      WEB_PORT: 3000
      NEXT_PUBLIC_API_URL: https://api.${DOMAIN:?required}
      # ─── Auth.js (apps/web) ───
      # AUTH_URL is Auth.js's authoritative public origin — without it, v5
      # derives callbackUrl/signinUrl from the listening socket (0.0.0.0:3000
      # inside the container) and produces broken redirects like
      # `https://0.0.0.0:3000/api/authjs/callback/google`. `trustHost: true`
      # in auth.ts handles request-host derivation for cookies + CSRF, but
      # link-building still consults AUTH_URL first.
      AUTH_URL: https://${DOMAIN}
      AUTH_ISSUER: https://${DOMAIN}
      AUTH_AUDIENCE: esharevice-api
      AUTH_SECRET: ${AUTH_SECRET:?required}
      AUTH_JWT_PRIVATE_KEY: ${AUTH_JWT_PRIVATE_KEY:?required}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      AUTH_APPLE_ID: ${AUTH_APPLE_ID:-}
      AUTH_APPLE_TEAM_ID: ${AUTH_APPLE_TEAM_ID:-}
      AUTH_APPLE_KEY_ID: ${AUTH_APPLE_KEY_ID:-}
      AUTH_APPLE_PRIVATE_KEY: ${AUTH_APPLE_PRIVATE_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      AUTH_RESEND_FROM: ${AUTH_RESEND_FROM:-auth@${DOMAIN}}
      SENTRY_DSN: ${SENTRY_DSN_WEB:-}
    depends_on:
      api: { condition: service_healthy }
    networks: [edge]

  # ─────────────────────────────────────────── Edge
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"      # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:?required}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:?required}
      UPTIME_BASIC_AUTH_HASH: ${UPTIME_BASIC_AUTH_HASH:?required}
    depends_on:
      - web
      - api
    networks: [edge]

  # ─────────────────────────────────────────── Monitoring
  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data
    networks: [edge]
